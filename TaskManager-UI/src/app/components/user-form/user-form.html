<div class="form-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Registrar Colaborador</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="userForm" (ngSubmit)="onSubmit()">

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Nombre completo</mat-label>
                    <input matInput formControlName="name" placeholder="Ej: Juan Pérez">
                    <mat-icon matSuffix>person</mat-icon>
                    <mat-error *ngIf="userForm.get('name')?.hasError('required')">El nombre es obligatorio.</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Correo electrónico</mat-label>
                    <input matInput formControlName="email" type="email" placeholder="juan@empresa.com">
                    <mat-icon matSuffix>email</mat-icon>
                    <mat-error *ngIf="userForm.get('email')?.hasError('email')">Ingresa un correo válido.</mat-error>
                    <mat-error *ngIf="userForm.get('email')?.hasError('required')">El correo es obligatorio.</mat-error>
                </mat-form-field>

                <div class="actions">
                    <button mat-button type="button" routerLink="/tasks">Volver</button>
                    <button mat-raised-button color="primary" type="submit" [disabled]="userForm.invalid">
                        Registrar
                    </button>
                </div>

            </form>
        </mat-card-content>
    </mat-card>
</div>
